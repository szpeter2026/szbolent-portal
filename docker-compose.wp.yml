# WordPress headless — 本地联调（Mac）
# Poetry-modown 主题路径请按本机修改 POETRY_MODOWN_WP_CONTENT
#
#   cp .env.example .env.local   # 门户
#   docker compose -f docker-compose.wp.yml up -d
#
# WP: http://localhost:8800
# 门户 dev 代理: vite.config.ts → /wp-json → :8800

services:
  mysql:
    image: mysql:8.0
    container_name: szbolent_wp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: modown_wp
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - szbolent_wp_mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:6.7-php8.3-apache
    container_name: szbolent_wp
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: modown_wp
      WORDPRESS_TABLE_PREFIX: genz_
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME','http://localhost:8800');
        define('WP_SITEURL','http://localhost:8800');
    volumes:
      - szbolent_wp_data:/var/www/html
    ports:
      - "8800:80"

volumes:
  szbolent_wp_mysql_data:
  szbolent_wp_data:
