# Bolent WordPress — 阿里云 ECS 47.115.168.107
# 备案前用 IP 访问；备案后改 server_name 并上 HTTPS

server {
    listen 80;
    listen [::]:80;
    server_name 47.115.168.107 szbolent.cn www.szbolent.cn szbolent.com.cn www.szbolent.com.cn bolent.cn www.bolent.cn;

    client_max_body_size 64m;

    # bolent.cn / szbolent.com.cn → www.szbolent.cn（门户统一到 .cn）
    # if ($host ~* ^(bolent\.cn|www\.bolent\.cn|szbolent\.com\.cn|www\.szbolent\.com\.cn)$) {
    #     return 301 https://www.szbolent.cn$request_uri;
    # }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # API 代理 → Looma Flask (api.genz.ltd)
    location /v1/ {
        proxy_pass http://api.genz.ltd/v1/;
        proxy_set_header Host api.genz.ltd;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }
}
