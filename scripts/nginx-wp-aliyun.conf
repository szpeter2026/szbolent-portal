# Bolent WordPress — 阿里云 ECS 47.115.168.107
# 备案前用 IP 访问；备案后改 server_name 并上 HTTPS

server {
    listen 80;
    listen [::]:80;
    server_name 47.115.168.107 szbolent.com.cn www.szbolent.com.cn bolent.cn www.bolent.cn;

    client_max_body_size 64m;

    # bolent.cn → www.szbolent.com.cn（备案后取消注释并配 HTTPS）
    # if ($host ~* ^(bolent\.cn|www\.bolent\.cn)$) {
    #     return 301 https://www.szbolent.com.cn$request_uri;
    # }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
