<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bolent Logo · 主版本
       图形：融合数据节点（左）与书卷/竹简意象（右），墨青为主，琥珀金点缀
       安全间距：图形四周预留 ≥16px clear space
       最小尺寸：宽 120px（数字宽度约 0.5x） -->
  <g>
    <!-- 图形标记 · 40x40 -->
    <g transform="translate(8, 12)">
      <!-- 左半：数据节点网络（墨青） -->
      <rect x="2" y="6" width="14" height="14" rx="3" fill="#0E6E6A"/>
      <rect x="2" y="24" width="14" height="8" rx="3" fill="#0E6E6A" opacity="0.55"/>
      <!-- 右半：书卷/竹简意象（琥珀金圆点 + 墨青弧线） -->
      <path d="M22 6 Q34 14 22 30" stroke="#0E6E6A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="30" cy="18" r="3.5" fill="#C99A3F"/>
      <!-- 底部连线，象征连接 -->
      <path d="M6 38 L30 38" stroke="#0E6E6A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    </g>
    <!-- 文字标 · Bolent -->
    <text x="56" y="42" font-family="Manrope, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1A1F1E" letter-spacing="-0.5">Bolent</text>
  </g>
</svg>
