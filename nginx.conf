# szbolent-portal Vue SPA — Nginx 配置
# WordPress 主站见 scripts/nginx-wp-aliyun.conf

server {
    listen 80;
    server_name szbolent.cn szbolent.com.cn;

    # 301 重定向：裸域 → canonical www 域名
    return 301 https://www.szbolent.com.cn$request_uri;
}

server {
    listen 80;
    server_name www.szbolent.com.cn;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
