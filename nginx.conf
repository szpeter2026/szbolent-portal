# Bolent WordPress — 阿里云 ECS 47.115.168.107
# Nginx 反向代理 → WordPress Docker 容器 (127.0.0.1:8080)
# 备案前用 IP 访问；备案后改 server_name 并上 HTTPS

server {
    listen 80 default_server;
    listen [::]:80;
    server_name _ 47.115.168.107 szbolent.cn www.szbolent.cn szbolent.com.cn www.szbolent.com.cn bolent.cn www.bolent.cn;

    client_max_body_size 64m;
    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # szbolent.com.cn → www.szbolent.cn（门户统一到个人备案 .cn）
    # if ($host ~* ^(szbolent\.com\.cn|www\.szbolent\.com\.cn)$) {
    #     return 301 https://www.szbolent.cn$request_uri;
    # }

    # bolent.cn → www.szbolent.cn（备案后取消注释并配 HTTPS）
    # if ($host ~* ^(bolent\.cn|www\.bolent\.cn)$) {
    #     return 301 https://www.szbolent.cn$request_uri;
    # }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # API 代理（保留）
    location /v1/ {
        proxy_pass http://139.180.184.25/v1/;
        proxy_set_header Host api.genz.ltd;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }
}
