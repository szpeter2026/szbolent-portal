# szbolent-portal Vue SPA — Nginx 配置
# 支持 IP 直接访问与 szbolent.cn / szbolent.com.cn 域名

server {
    listen 80 default_server;
    server_name _ 47.115.168.107 szbolent.cn szbolent.com.cn www.szbolent.com.cn;

    root /var/www/szbolent-portal/dist;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /v1/ {
        proxy_pass http://139.180.184.25/v1/;
        proxy_set_header Host api.genz.ltd;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }
}
