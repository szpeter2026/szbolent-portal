name: Sync to Gitee

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'szpeter2026/szbolent-portal'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Sync to Gitee
        run: |
          git remote add gitee "https://szbenyx:${{ secrets.GITEE_TOKEN }}@gitee.com/szbenyx/szbolent-portal.git"
          git push gitee main --tags --force
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
