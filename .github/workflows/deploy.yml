name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          config: |
            Host deploy
              HostName 47.115.168.107
              User root
              StrictHostKeyChecking no

      - name: Ensure rsync on server
        run: |
          ssh deploy 'if ! command -v rsync &>/dev/null; then yum install -y rsync 2>/dev/null || dnf install -y rsync 2>/dev/null || (apt-get update -qq && apt-get install -y -qq rsync); fi'

      - name: Deploy to server
        run: |
          rsync -avz --delete dist/ deploy:/var/www/szbolent-portal/dist/
          rsync -avz nginx.conf deploy:/var/www/szbolent-portal/nginx/szbolent.conf

      - name: Reload nginx
        run: |
          ssh deploy "
            cp /var/www/szbolent-portal/nginx/szbolent.conf /etc/nginx/conf.d/00-szbolent.conf &&
            for f in /etc/nginx/conf.d/*.conf; do
              [ \"\$f\" = /etc/nginx/conf.d/00-szbolent.conf ] && continue
              sed -i 's/default_server//g' \"\$f\"
            done &&
            nginx -t &&
            systemctl reload nginx &&
            echo '✅ Deploy OK'
          "
