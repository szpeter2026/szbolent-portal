name: Build & Deploy to Vultr

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SITE_URL: https://www.szbolent.com.cn
          VITE_LOOMA_API_BASE: https://api.szbolent.com.cn
          VITE_BLOG_API_BASE: /wp-json/wp/v2

      - name: Build Docker image
        run: docker build -t szbolent-portal:${{ github.sha }} .

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/szbolent-portal
            docker compose pull || true
            docker compose up -d --build
