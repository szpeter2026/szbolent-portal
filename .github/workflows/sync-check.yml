name: Sync Consistency Check

on:
  schedule:
    - cron: '0 8 * * *'  # 每天北京时间 16:00 (UTC 8:00)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.repository == 'szpeter2026/szbolent-portal'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare Remotes
        run: |
          echo "## 🔍 仓库同步一致性检测" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # GitHub HEAD
          GH_SHA=$(git rev-parse HEAD)
          echo "**GitHub HEAD:** \`${GH_SHA:0:8}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Gitee HEAD
          GITEE_URL="https://gitee.com/szbenyx/szbolent-portal.git"
          GITEE_SHA=$(git ls-remote "$GITEE_URL" refs/heads/main | awk '{print $1}')

          if [ -z "$GITEE_SHA" ]; then
            echo "⚠️ **Gitee:** 无法获取" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Gitee HEAD:** \`${GITEE_SHA:0:8}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$GH_SHA" = "$GITEE_SHA" ]; then
              echo "✅ **结果: 仓库完全同步!**" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ **结果: 仓库存在差异，请手动同步!**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "差异 commits:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              git log --oneline "${GITEE_SHA}..${GH_SHA}" 2>/dev/null || echo "(无法计算差异)" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

